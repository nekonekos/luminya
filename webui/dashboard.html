<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - LumiNya</title>
    <link rel="stylesheet" href="/css/pc.css">
    <!-- 补充样式：个人主页特有 -->
    <style>
        /* 复用弹窗样式（与 home 一致） */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-box {
            background: #fff;
            border-radius: 24px;
            padding: 32px 28px 28px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.25s;
        }
        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }
        .modal-icon {
            font-size: 2.4rem;
            margin-bottom: 8px;
            color: #b88a5e;
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2e241a;
            margin-bottom: 8px;
        }
        .modal-desc {
            font-size: 0.9rem;
            color: #6b5d4f;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .modal-action {
            display: inline-block;
            background: #8faa8f;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }
        .modal-action:hover {
            background: #7a9e7a;
        }
        .auto-redirect-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 12px 0 4px;
        }
        .auto-redirect-text a {
            color: #b88a5e;
            font-weight: 500;
        }

        /* 个人主页布局 */
        .dashboard-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 24px;
        }

        /* 用户信息头部 */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 32px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            margin-bottom: 24px;
        }
        .profile-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a3c9a3, #7a9e7a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
        }
        .profile-info {
            flex: 1;
        }
        .profile-username {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .profile-levels {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .profile-level-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }
        .profile-stats {
            display: flex;
            gap: 24px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .profile-stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .profile-stat strong {
            color: var(--text-primary);
            font-weight: 700;
        }
        .profile-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .profile-action-btn {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            white-space: nowrap;
        }
        .profile-action-btn:hover {
            border-color: #b88a5e;
            color: #b88a5e;
        }

        /* 帖子列表区域 */
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .post-list-item {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            transition: 0.2s;
            cursor: pointer;
        }
        .post-list-item:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .post-list-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .post-list-meta {
            display: flex;
            gap: 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        .post-list-tags {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .post-list-tag {
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 16px;
            background: #eef2e7;
            color: #5f7a5f;
        }
        .end-of-posts {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <!-- 顶部导航（复用） -->
    <header class="header">
        <div class="header-left">
            <a href="/home.html" class="logo"><span class="logo-symbol">✦</span>LumiNya</a>
            <span class="slogan">“每一缕思绪，都有回响”</span>
        </div>
        <div class="header-right" id="headerRight">
            <!-- 动态渲染 -->
        </div>
    </header>

    <!-- 主内容 -->
    <div class="dashboard-wrapper">
        <!-- 用户信息头部 -->
        <div class="profile-header" id="profileHeader">
            <!-- 动态渲染 -->
        </div>

        <!-- 帖子列表 -->
        <div class="section-title">我的帖子</div>
        <div class="post-list" id="postList">
            <!-- 动态渲染 -->
        </div>
        <div id="postSentinel" style="height:1px;"></div>
    </div>

    <!-- 未登录弹窗 -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-box">
            <div class="modal-icon">🔒</div>
            <div class="modal-title">您还未登录</div>
            <div class="modal-desc" id="authModalDesc">正在自动跳转登录界面...</div>
            <div class="auto-redirect-text">
                若长时间无响应，<a href="/login.html?redirect=" id="manualLoginLink">点击这里</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        LumiNya · 私域创作社区 · 2026
    </footer>

    <script src="/js/fetch.js"></script>
    <script>
        (function() {
            // 常量映射
            const RING_MAP = {
                'user_TOR_spring': { label: '春·萌芽', icon: '🌿' },
                'user_TOR_summer': { label: '夏·繁茂', icon: '☀️' },
                'user_TOR_autumn': { label: '秋·蕴藏', icon: '🍂' },
                'user_TOR_winter': { label: '冬·休憩', icon: '❄️' }
            };
            const SPECTRUM_MAP = {
                'user_spectrum_candle':    { label: '烛火', icon: '🕯️' },
                'user_spectrum_flame':     { label: '焰心', icon: '🔥' },
                'user_spectrum_glow':      { label: '灵光', icon: '💡' },
                'user_spectrum_lumi':      { label: '星辉', icon: '🌟' },
                'user_spectrum_sunbright': { label: '极昼', icon: '☀️' }
            };

            // 全局状态
            let userData = null;
            let currentUserId = null;
            let postPage = 1;
            let hasMorePosts = true;
            let isLoadingPosts = false;

            // DOM
            const profileHeader = document.getElementById('profileHeader');
            const postList = document.getElementById('postList');
            const postSentinel = document.getElementById('postSentinel');
            const authModal = document.getElementById('authModal');
            const authModalDesc = document.getElementById('authModalDesc');
            const manualLoginLink = document.getElementById('manualLoginLink');
            const headerRight = document.getElementById('headerRight');

            // 未登录处理
            function handleNotLoggedIn() {
                // 显示弹窗
                authModal.classList.add('active');
                const redirectUrl = encodeURIComponent(window.location.href);
                manualLoginLink.href = '/login.html?redirect=' + redirectUrl;
                
                // 倒计时1秒后跳转
                let countdown = 1;
                authModalDesc.textContent = `正在自动跳转登录界面... (${countdown}秒)`;
                const timer = setInterval(() => {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        window.location.href = '/login.html?redirect=' + redirectUrl;
                    } else {
                        authModalDesc.textContent = `正在自动跳转登录界面... (${countdown}秒)`;
                    }
                }, 1000);
            }

            // 加载用户信息
            async function loadUserProfile() {
                try {
                    userData = await LumiNyaAPI.get('/users/me');
                    currentUserId = userData.userId;
                    renderProfileHeader();
                    renderHeaderUser();
                    // 开始加载帖子
                    await loadPosts(true);
                } catch (err) {
                    console.error('获取用户信息失败', err);
                    // 可能 token 失效， fetch.js 会跳转登录，这里不重复处理
                    if (!LumiNyaAPI.getToken()) {
                        handleNotLoggedIn();
                    } else {
                        // 其他错误
                        profileHeader.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-muted);">加载失败，请刷新重试</p>';
                    }
                }
            }

            // 渲染头部导航用户
            function renderHeaderUser() {
                if (userData) {
                    const ring = RING_MAP[userData.annualRing] || { label: userData.annualRing, icon: '' };
                    const spectrum = SPECTRUM_MAP[userData.spectrum] || { label: userData.spectrum, icon: '' };
                    headerRight.innerHTML = `
                        <div class="user-badge">
                            <div class="user-avatar">${userData.username.charAt(0)}</div>
                            <span>${userData.username}</span>
                            <span class="level-text">${ring.label} | ${spectrum.label}</span>
                        </div>
                        <button class="btn-outline" id="gotoContentCenter">创作中心</button>
                    `;
                    document.getElementById('gotoContentCenter').addEventListener('click', () => {
                        window.open('/contentcenter.html', '_blank');
                    });
                } else {
                    headerRight.innerHTML = `<button class="btn-outline" onclick="location.href='/login.html?redirect=${encodeURIComponent(window.location.href)}'">登录</button>`;
                }
            }

            // 渲染个人资料头部
            function renderProfileHeader() {
                const ring = RING_MAP[userData.annualRing] || { label: userData.annualRing, icon: '🌱' };
                const spectrum = SPECTRUM_MAP[userData.spectrum] || { label: userData.spectrum, icon: '🕯️' };
                const totalLikes = userData.totalLikes || 0;
                const totalViews = userData.totalViews || 0;
                // 注册时间格式化
                const regDate = userData.registeredAt ? new Date(userData.registeredAt * 1000).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long' }) : '未知';

                profileHeader.innerHTML = `
                    <div class="profile-avatar">${userData.username.charAt(0)}</div>
                    <div class="profile-info">
                        <div class="profile-username">${userData.username}</div>
                        <div class="profile-levels">
                            <span class="profile-level-badge">
                                <span style="color:var(--accent-spring);">${ring.icon}</span> ${ring.label}
                            </span>
                            <span class="profile-level-badge">
                                <span style="color:var(--accent-spectrum);">${spectrum.icon}</span> ${spectrum.label}
                            </span>
                        </div>
                        <div class="profile-stats">
                            <span class="profile-stat">❤️ <strong>${totalLikes}</strong> 获赞</span>
                            <span class="profile-stat">👁️ <strong>${totalViews}</strong> 浏览</span>
                            <span class="profile-stat">📅 注册于 ${regDate}</span>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button class="profile-action-btn" id="gotoAccount">安全中心</button>
                    </div>
                `;

                document.getElementById('gotoAccount').addEventListener('click', () => {
                    window.location.href = '/accountcenter.html?from=' + encodeURIComponent(window.location.href);
                });
            }

            // 加载帖子列表
            async function loadPosts(reset = false) {
                if (isLoadingPosts || !currentUserId) return;
                if (reset) {
                    postPage = 1;
                    hasMorePosts = true;
                    postList.innerHTML = '';
                }
                if (!hasMorePosts) return;

                isLoadingPosts = true;
                try {
                    const params = new URLSearchParams({
                        userId: currentUserId,
                        page: postPage.toString()
                    });
                    const data = await LumiNyaAPI.get('/posts?' + params.toString());
                    const posts = data.posts || [];
                    const total = data.total || 0;

                    posts.forEach(post => {
                        const tags = (post.tags || []).map(t => `<span class="post-list-tag">#${t.tag_name}</span>`).join('');
                        const timeStr = formatRelativeTime(post.posts_created_at);
                        const coverHtml = (post.posts_hascover && post.posts_cover_url && post.posts_cover_url !== 'N/A') 
                            ? `<div style="width:60px;height:40px;border-radius:8px;overflow:hidden;margin-right:12px;"><img src="${post.posts_cover_url}?width=200" style="width:100%;height:100%;object-fit:cover;" alt="cover"></div>` 
                            : '';
                        const item = document.createElement('article');
                        item.className = 'post-list-item';
                        item.innerHTML = `
                            <div style="display:flex;align-items:flex-start;">
                                ${coverHtml}
                                <div style="flex:1;">
                                    <div class="post-list-title">${escapeHtml(post.posts_title)}</div>
                                    <div class="post-list-meta">
                                        <span>${timeStr}</span>
                                        <span>${post.posts_views || 0} 浏览</span>
                                    </div>
                                    <div class="post-list-tags">${tags}</div>
                                </div>
                            </div>
                        `;
                        item.addEventListener('click', () => {
                            window.location.href = `/home.html?post=${post.posts_id}`;
                        });
                        postList.appendChild(item);
                    });

                    postPage++;
                    hasMorePosts = postPage * 20 < total; // 假设每页20条，根据返回的total判断
                    if (!hasMorePosts) {
                        const endMsg = document.createElement('div');
                        endMsg.className = 'end-of-posts';
                        endMsg.textContent = '没有更多内容啦';
                        postList.appendChild(endMsg);
                    }
                } catch (err) {
                    console.error('加载帖子失败', err);
                    const errMsg = document.createElement('div');
                    errMsg.className = 'end-of-posts';
                    errMsg.textContent = '加载失败，请重试';
                    postList.appendChild(errMsg);
                } finally {
                    isLoadingPosts = false;
                }
            }

            // 滚动监听：加载更多
            function setupIntersectionObserver() {
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting && hasMorePosts && !isLoadingPosts && currentUserId) {
                        loadPosts(false);
                    }
                }, { threshold: 0.1 });
                observer.observe(postSentinel);
            }

            // 工具函数
            function formatRelativeTime(timestamp) {
                if (!timestamp) return '';
                const now = Math.floor(Date.now() / 1000);
                const diff = now - timestamp;
                if (diff < 60) return '刚刚';
                if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
                if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
                if (diff < 2592000) return Math.floor(diff / 86400) + '天前';
                return new Date(timestamp * 1000).toLocaleDateString('zh-CN');
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // 初始化
            async function init() {
                setupIntersectionObserver();
                const token = LumiNyaAPI.getToken();
                if (!token) {
                    handleNotLoggedIn();
                    return;
                }
                // 有 token，尝试加载用户信息
                await loadUserProfile();
            }

            init().catch(err => {
                console.error('初始化错误', err);
            });
        })();
    </script>
</body>
</html>
