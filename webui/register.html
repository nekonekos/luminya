<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - LumiNya</title>
    <link rel="stylesheet" href="/css/pc.css">
    <style>
        .register-wrapper {
            min-height: calc(100vh - 60px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .register-card {
            background: #fff;
            border-radius: 24px;
            padding: 40px 36px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }
        .register-card h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 8px;
        }
        .register-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: 0.2s;
            outline: none;
            background: #fefcf9;
            color: var(--text-primary);
        }
        .form-group input:focus {
            border-color: #b88a5e;
            box-shadow: 0 0 0 3px rgba(184,138,94,0.1);
        }
        .hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background: #8faa8f;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-register:hover {
            background: #7a9e7a;
        }
        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .register-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .register-footer a {
            color: #b88a5e;
            font-weight: 500;
            text-decoration: none;
        }
        .register-footer a:hover {
            text-decoration: underline;
        }
        .error-msg {
            background: #fff0f0;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 10px;
            color: #b02a2a;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.visible {
            display: block;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 自定义弹窗（与home一致） */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-box {
            background: #fff;
            border-radius: 24px;
            padding: 32px 28px 28px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.25s;
        }
        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }
        .modal-icon {
            font-size: 2.4rem;
            margin-bottom: 8px;
            color: #b88a5e;
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2e241a;
            margin-bottom: 8px;
        }
        .modal-desc {
            font-size: 0.9rem;
            color: #6b5d4f;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .modal-action {
            display: inline-block;
            background: #8faa8f;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .modal-action:hover {
            background: #7a9e7a;
        }
        .modal-auto-status {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 12px 0 8px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/home.html" class="logo"><span class="logo-symbol">✦</span>LumiNya</a>
            <span class="slogan">“每一缕思绪，都有回响”</span>
        </div>
        <div class="header-right">
            <span style="color: var(--text-muted); font-size:0.8rem;">私域创作社区</span>
        </div>
    </header>

    <div class="register-wrapper">
        <div class="register-card">
            <h2>加入 LumiNya</h2>
            <p class="register-subtitle">创建你的创作者身份</p>

            <div class="error-msg" id="errorMsg"></div>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="username">用户名 <span style="font-weight:400; color:var(--text-muted);">(3-20位字母数字下划线)</span></label>
                    <input type="text" id="username" name="username" placeholder="你的用户名" required maxlength="20" autocomplete="username">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" placeholder="设置密码" required autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">确认密码</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="再次输入密码" required autocomplete="new-password">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">邮箱 <span style="font-weight:400; color:var(--text-muted);">(选填)</span></label>
                        <input type="email" id="email" name="email" placeholder="example@mail.com">
                    </div>
                    <div class="form-group">
                        <label for="phone">手机号 <span style="font-weight:400; color:var(--text-muted);">(选填)</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="手机号">
                    </div>
                </div>
                <button type="submit" class="btn-register" id="registerBtn">注册</button>
            </form>

            <div class="register-footer">
                已有账号？<a href="/login.html">立即登录</a>
            </div>
            <a href="/home.html" class="back-link">← 返回首页</a>
        </div>
    </div>

    <!-- 注册成功弹窗 -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-box">
            <div class="modal-icon">🎉</div>
            <div class="modal-title">注册成功！</div>
            <div class="modal-desc" id="modalStatusText">正在为您自动登录并跳转...</div>
            <div class="modal-auto-status" id="manualLink">
                <!-- 动态插入手动登录链接 -->
            </div>
        </div>
    </div>

    <footer class="footer">
        LumiNya · 私域创作社区 · 2026
    </footer>

    <script src="/js/fetch.js"></script>
    <script>
        (function() {
            const form = document.getElementById('registerForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const emailInput = document.getElementById('email');
            const phoneInput = document.getElementById('phone');
            const registerBtn = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successModal = document.getElementById('successModal');
            const modalStatusText = document.getElementById('modalStatusText');
            const manualLinkContainer = document.getElementById('manualLink');

            const urlParams = new URLSearchParams(window.location.search);
            const redirectParam = urlParams.get('redirect') || '/dashboard.html';

            function hideError() {
                errorMsg.classList.remove('visible');
                errorMsg.textContent = '';
            }

            function showError(message) {
                errorMsg.textContent = message;
                errorMsg.classList.add('visible');
            }

            // 前端校验
            function validateForm() {
                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                const email = emailInput.value.trim();
                const phone = phoneInput.value.trim();

                if (!username) return '请输入用户名';
                if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) return '用户名只能包含字母、数字、下划线，长度3-20位';
                if (!password) return '请输入密码';
                if (password.length < 6) return '密码长度至少6位';
                if (password !== confirmPassword) return '两次密码不一致';
                if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return '邮箱格式不正确';
                if (phone && !/^[\d\-+() ]{7,20}$/.test(phone)) return '手机号格式不正确';
                return null;
            }

            // 自动登录
            async function autoLogin(username, password) {
                try {
                    const loginRes = await LumiNyaAPI.post('/users/login', {
                        account: username,
                        password: password
                    });
                    if (loginRes && loginRes.token) {
                        LumiNyaAPI.setToken(loginRes.token);
                        // 可选：获取用户完整信息并缓存
                        try {
                            const userInfo = await LumiNyaAPI.get('/users/me');
                            // 可存储到 localStorage 或内存
                            localStorage.setItem('luminya_user', JSON.stringify(userInfo));
                        } catch (e) { /* 静默失败 */ }
                        return true;
                    }
                    return false;
                } catch (e) {
                    return false;
                }
            }

            // 显示成功弹窗
            function showSuccessModal(username, password) {
                modalStatusText.textContent = '正在为您自动登录并跳转...';
                manualLinkContainer.innerHTML = '<span style="color: var(--text-muted);">如果未跳转，<a href="/login.html?redirect=' + encodeURIComponent(redirectParam) + '" style="color:#b88a5e; font-weight:500;">点击这里手动登录</a></span>';
                successModal.classList.add('active');

                // 执行自动登录
                autoLogin(username, password).then(success => {
                    if (success) {
                        modalStatusText.textContent = '登录成功，即将跳转...';
                        setTimeout(() => {
                            window.location.href = redirectParam.startsWith('/') ? redirectParam : '/dashboard.html';
                        }, 1000);
                    } else {
                        modalStatusText.textContent = '自动登录失败，请手动登录。';
                        manualLinkContainer.innerHTML = '<a href="/login.html?redirect=' + encodeURIComponent(redirectParam) + '" class="modal-action">手动登录</a>';
                    }
                });
            }

            // 表单提交
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                hideError();

                const validationError = validateForm();
                if (validationError) {
                    showError(validationError);
                    return;
                }

                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                const email = emailInput.value.trim() || undefined;
                const phone = phoneInput.value.trim() || undefined;

                registerBtn.disabled = true;
                registerBtn.textContent = '注册中...';

                try {
                    const body = { username, password };
                    if (email) body.email = email;
                    if (phone) body.phone = phone;

                    await LumiNyaAPI.post('/users/register', body);
                    // 注册成功，弹出提示并自动登录
                    showSuccessModal(username, password);
                } catch (error) {
                    showError(error.message || '注册失败，请稍后重试');
                } finally {
                    registerBtn.disabled = false;
                    registerBtn.textContent = '注册';
                }
            });

            // 输入时清除错误
            [usernameInput, passwordInput, confirmPasswordInput, emailInput, phoneInput].forEach(input => {
                input.addEventListener('input', hideError);
            });

            // 弹窗点击背景不关闭（用户只能通过手动链接离开）
            // 但为了友好，可以加个关闭按钮？不需要，自动登录中。
        })();
    </script>
</body>
</html>
