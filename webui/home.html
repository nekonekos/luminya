<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiNya · 私域创作社区</title>
    <link rel="stylesheet" href="/css/pc.css">
    <style>
        /* 复用弹窗样式（与之前统一） */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-box {
            background: #fff;
            border-radius: 24px;
            padding: 32px 28px 28px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.25s;
        }
        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }
        .modal-close {
            position: absolute;
            top: 14px; right: 18px;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: #f5efe8;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #6b5d4f;
            transition: 0.2s;
        }
        .modal-close:hover {
            background: #e6ddd2;
            color: #2e241a;
        }
        .modal-icon {
            font-size: 2.4rem;
            margin-bottom: 8px;
            color: #b88a5e;
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2e241a;
            margin-bottom: 8px;
        }
        .modal-desc {
            font-size: 0.9rem;
            color: #6b5d4f;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .modal-btn {
            display: inline-block;
            background: #8faa8f;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 32px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-btn:hover {
            background: #7a9e7a;
        }

        /* 搜索栏 */
        .search-bar {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.6);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 4px 12px;
            gap: 6px;
            margin: 0 20px;
            flex: 1;
            max-width: 360px;
        }
        .search-bar input {
            border: none;
            outline: none;
            background: transparent;
            font-size: 0.85rem;
            padding: 6px 4px;
            width: 100%;
            color: var(--text-primary);
        }
        .search-bar input::placeholder {
            color: var(--text-muted);
        }
        .search-bar .search-icon {
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
        }

        /* 帖子详情额外样式 */
        .post-detail-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            margin-bottom: 20px;
        }
        .post-detail-cover {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 20px;
            max-height: 400px;
            object-fit: cover;
        }
        .post-detail-content {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-primary);
            margin: 20px 0;
            word-break: break-word;
        }
        .post-detail-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .post-detail-tags {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .post-detail-tag {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 16px;
            background: #eef2e7;
            color: #5f7a5f;
        }

        /* 评论区 */
        .comments-section {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            margin-top: 20px;
        }
        .comment-form {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .comment-form textarea {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            resize: vertical;
            background: #fefcf9;
            outline: none;
            min-height: 40px;
        }
        .comment-form textarea:focus {
            border-color: #b88a5e;
            box-shadow: 0 0 0 3px rgba(184,138,94,0.1);
        }
        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .comment-item {
            display: flex;
            gap: 12px;
        }
        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #cdb79e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            flex-shrink: 0;
        }
        .comment-body {
            flex: 1;
            background: #faf7f2;
            border-radius: 12px;
            padding: 10px 14px;
        }
        .comment-author {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }
        .comment-content {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .comment-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .comment-reply-btn {
            font-size: 0.75rem;
            color: #b88a5e;
            cursor: pointer;
            background: none;
            border: none;
            padding: 2px 0;
            font-weight: 500;
        }
        .comment-children {
            margin-left: 44px;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .no-comments {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 20px;
        }
        .loading-indicator {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .end-of-feed {
            text-align: center;
            padding: 14px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-light);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/home.html" class="logo"><span class="logo-symbol">✦</span>LumiNya</a>
            <span class="slogan">“每一缕思绪，都有回响”</span>
        </div>
        <!-- 搜索栏（预留） -->
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="搜索标签或关键词..." id="searchInput" disabled title="搜索功能即将上线">
        </div>
        <div class="header-right" id="headerRight">
            <!-- 动态渲染：未登录显示登录/注册，已登录显示用户徽章和创作中心 -->
        </div>
    </header>

    <div class="main-container">
        <aside class="left-sidebar" id="leftSidebar">
            <!-- 动态渲染标签云、成长信息 -->
        </aside>

        <main class="content-feed" id="contentFeed">
            <!-- 动态渲染：Feed列表或帖子详情 -->
        </main>

        <aside class="right-sidebar" id="rightSidebar">
            <!-- 动态渲染用户卡片、AI精灵、热议标签 -->
        </aside>
    </div>

    <button class="float-create-btn" id="createBtn" title="写新帖子">+</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">×</button>
            <div class="modal-icon" id="modalIcon">✨</div>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-desc" id="modalDesc"></div>
            <button class="modal-btn" id="modalActionBtn"></button>
        </div>
    </div>

    <footer class="footer">
        LumiNya · 私域创作社区 · 2026
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="/js/fetch.js"></script>
    <script>
        (function() {
            'use strict';

            // ---------- 常量 ----------
            const RING_MAP = {
                'user_TOR_spring': { label: '春·萌芽', icon: '🌿', cssClass: 'spring' },
                'user_TOR_summer': { label: '夏·繁茂', icon: '☀️', cssClass: 'summer' },
                'user_TOR_autumn': { label: '秋·蕴藏', icon: '🍂', cssClass: 'autumn' },
                'user_TOR_winter': { label: '冬·休憩', icon: '❄️', cssClass: 'winter' }
            };
            const SPECTRUM_MAP = {
                'user_spectrum_candle':    { label: '烛火', icon: '🕯️', cssClass: 'candle' },
                'user_spectrum_flame':     { label: '焰心', icon: '🔥', cssClass: 'flame' },
                'user_spectrum_glow':      { label: '灵光', icon: '💡', cssClass: 'glow' },
                'user_spectrum_lumi':      { label: '星辉', icon: '🌟', cssClass: 'lumi' },
                'user_spectrum_sunbright': { label: '极昼', icon: '☀️', cssClass: 'sunbright' }
            };

            let currentUser = null;
            let feedCursor = null;
            let feedHasMore = true;
            let feedLoading = false;
            let feedObserver = null;
            let postDetailId = null;

            const headerRight = document.getElementById('headerRight');
            const leftSidebar = document.getElementById('leftSidebar');
            const contentFeed = document.getElementById('contentFeed');
            const rightSidebar = document.getElementById('rightSidebar');
            const createBtn = document.getElementById('createBtn');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalClose = document.getElementById('modalClose');
            const modalIcon = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalDesc = document.getElementById('modalDesc');
            const modalActionBtn = document.getElementById('modalActionBtn');

            // ---------- 工具函数 ----------
            function formatRelativeTime(timestamp) {
                if (!timestamp) return '';
                const now = Math.floor(Date.now() / 1000);
                const diff = now - timestamp;
                if (diff < 60) return '刚刚';
                if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
                if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
                if (diff < 2592000) return Math.floor(diff / 86400) + '天前';
                return new Date(timestamp * 1000).toLocaleDateString('zh-CN');
            }

            function renderMarkdown(mdText) {
                if (!mdText) return '';
                const rawHtml = marked.parse(mdText);
                return DOMPurify.sanitize(rawHtml);
            }

            function showModal(icon, title, desc, btnText, btnAction, showClose = true) {
                modalIcon.textContent = icon || '✨';
                modalTitle.textContent = title || '';
                modalDesc.textContent = desc || '';
                modalActionBtn.textContent = btnText || '确定';
                modalActionBtn.onclick = function() {
                    hideModal();
                    if (typeof btnAction === 'function') btnAction();
                };
                modalClose.style.display = showClose ? 'flex' : 'none';
                modalOverlay.classList.add('active');
            }
            function hideModal() {
                modalOverlay.classList.remove('active');
            }

            function hasToken() {
                return !!LumiNyaAPI.getToken();
            }

            async function fetchUserInfo() {
                if (!hasToken()) return null;
                try {
                    const user = await LumiNyaAPI.get('/users/me');
                    return user;
                } catch (e) {
                    return null;
                }
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ---------- 渲染函数 ----------
            function renderHeader() {
                if (currentUser) {
                    const ring = RING_MAP[currentUser.annualRing] || { label: currentUser.annualRing };
                    const spectrum = SPECTRUM_MAP[currentUser.spectrum] || { label: currentUser.spectrum };
                    headerRight.innerHTML = `
                        <div class="user-badge" id="userBadgeClickable" style="cursor:pointer;">
                            <div class="user-avatar">${currentUser.username.charAt(0)}</div>
                            <span>${currentUser.username}</span>
                            <span class="level-text">${ring.label} | ${spectrum.label}</span>
                        </div>
                        <button class="btn-outline" id="gotoDashboard">创作中心</button>
                    `;
                    document.getElementById('userBadgeClickable').addEventListener('click', () => {
                        window.location.href = '/dashboard.html';
                    });
                    document.getElementById('gotoDashboard').addEventListener('click', () => {
                        window.location.href = '/contentcenter.html';
                    });
                } else {
                    headerRight.innerHTML = `
                        <button class="btn-outline" id="gotoLogin">登录</button>
                        <button class="btn-outline" id="gotoRegister">注册</button>
                    `;
                    document.getElementById('gotoLogin').addEventListener('click', () => {
                        window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
                    });
                    document.getElementById('gotoRegister').addEventListener('click', () => {
                        window.location.href = '/register.html';
                    });
                }
            }

            function renderLeftSidebar() {
                let html = `
                    <div class="sidebar-card">
                        <div class="sidebar-title">主题标签</div>
                        <div class="tag-cloud" id="themeTags"></div>
                        <div class="sidebar-title" style="margin-top:16px;">情绪标签</div>
                        <div class="tag-cloud" id="moodTags"></div>
                    </div>
                `;
                if (currentUser) {
                    const ring = RING_MAP[currentUser.annualRing] || { label: currentUser.annualRing, icon: '🌱' };
                    const spectrum = SPECTRUM_MAP[currentUser.spectrum] || { label: currentUser.spectrum, icon: '🕯️' };
                    html += `
                        <div class="sidebar-card">
                            <div class="sidebar-title">我的成长</div>
                            <div class="growth-mini">
                                <span class="ring-icon">${ring.icon}</span>
                                <div>
                                    <div class="growth-label">年轮</div>
                                    <div class="growth-value">${ring.label}</div>
                                </div>
                            </div>
                            <div class="growth-mini">
                                <span class="ring-icon">${spectrum.icon}</span>
                                <div>
                                    <div class="growth-label">光谱</div>
                                    <div class="growth-value">${spectrum.label}</div>
                                </div>
                            </div>
                        </div>
                        <div style="font-size:0.75rem; color: var(--text-muted); padding:0 4px;">
                            年轮只增不减 · 光谱月度衰减10%<br>冬季光谱衰减暂停
                        </div>
                    `;
                } else {
                    html += `
                        <div class="sidebar-card">
                            <div class="sidebar-title">我的成长</div>
                            <p class="text-muted text-small">登录后查看成长数据</p>
                        </div>
                    `;
                }
                leftSidebar.innerHTML = html;
                loadTags('theme', 'themeTags');
                loadTags('mood', 'moodTags');
            }

            async function loadTags(type, containerId) {
                const container = document.getElementById(containerId);
                if (!container) return;
                const themeTags = ['React', '独立游戏', '前端工程化', 'UI设计', 'Rust', 'Serverless', 'AI绘画', '开源项目'];
                const moodTags = ['深夜灵感', 'UI吐槽', '开源焦虑', '求职焦虑', '创作热情'];
                const tags = type === 'theme' ? themeTags : moodTags;
                container.innerHTML = tags.map(t => `<span class="tag${type === 'mood' ? ' mood' : ''}" data-tag="${t}">#${t}</span>`).join('');
            }

            function renderRightSidebar() {
                let userCardHtml = '';
                if (currentUser) {
                    const ring = RING_MAP[currentUser.annualRing] || { label: currentUser.annualRing, icon: '🌱' };
                    const spectrum = SPECTRUM_MAP[currentUser.spectrum] || { label: currentUser.spectrum, icon: '🕯️' };
                    const regDate = currentUser.registeredAt ? new Date(currentUser.registeredAt * 1000).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long' }) : '未知';
                    userCardHtml = `
                        <div class="user-card">
                            <div class="user-card-avatar">${currentUser.username.charAt(0)}</div>
                            <div class="user-card-name">${currentUser.username}</div>
                            <div class="user-card-levels">
                                <span class="level-item">
                                    <span class="level-dot" style="background: var(--accent-spring);"></span>
                                    ${ring.label}
                                </span>
                                <span class="level-item">
                                    <span class="level-dot" style="background: var(--accent-spectrum);"></span>
                                    ${spectrum.label}
                                </span>
                            </div>
                            <div style="font-size:0.75rem; color:var(--text-muted); margin-top:10px;">
                                注册于 ${regDate}
                            </div>
                        </div>
                    `;
                } else {
                    userCardHtml = `
                        <div class="user-card">
                            <div class="user-card-avatar" style="background:#ddd;">?</div>
                            <div class="user-card-name">未登录</div>
                            <div class="user-card-levels">
                                <span style="font-size:0.8rem; color:var(--text-muted);">登录后查看年轮与光谱</span>
                            </div>
                        </div>
                    `;
                }
                rightSidebar.innerHTML = `
                    ${userCardHtml}
                    <div class="ai-card">
                        <span class="ai-avatar">灵光精灵</span>
                        <div class="ai-text">
                            悄悄对你说：<br>
                            “今天 <strong>#Rust</strong> 标签下有新讨论，要去看看吗？”
                        </div>
                    </div>
                    <div class="sidebar-card" style="padding:14px;">
                        <div class="sidebar-title">此刻热议</div>
                        <div class="tag-cloud" style="font-size:0.75rem;">
                            <span class="tag">#AI绘画</span>
                            <span class="tag mood">#求职焦虑</span>
                            <span class="tag">#开源项目</span>
                        </div>
                    </div>
                `;
            }

            function renderPostCard(post) {
                const isCorner = post.is_corner || false;
                const coverHtml = (post.posts_hascover && post.posts_cover_url && post.posts_cover_url !== 'N/A')
                    ? `<div class="post-cover"><img src="${post.posts_cover_url}?width=400" alt="封面" loading="lazy"></div>`
                    : '';
                const author = post.author || {};
                const ring = RING_MAP[author.user_annual_ring] || { label: author.user_annual_ring || '?' };
                const spectrum = SPECTRUM_MAP[author.user_spectrum] || { label: author.user_spectrum || '?' };
                const summary = post.posts_summary || '';
                const tags = (post.tags || []).slice(0, 2);
                const timeStr = formatRelativeTime(post.posts_created_at);
                const views = post.posts_views || 0;
                const likes = post.posts_likes || 0;

                return `
                    <article class="post-card ${isCorner ? 'highlight' : ''}" data-post-id="${post.posts_id}">
                        ${isCorner ? '<span class="highlight-label">角落之光</span>' : ''}
                        ${coverHtml}
                        <h3 class="post-title" ${isCorner ? 'style="margin-top:0;"' : ''}>${escapeHtml(post.posts_title)}</h3>
                        <p class="post-excerpt">${escapeHtml(summary)}</p>
                        <div class="post-meta">
                            <div class="post-tags">
                                ${tags.map(t => `<span class="post-tag">#${escapeHtml(t.tag_name)}</span>`).join('')}
                            </div>
                            <span class="post-author">${escapeHtml(author.user_username || '匿名')} <span class="author-level">${ring.label} | ${spectrum.label}</span></span>
                            <span class="meta-dot"></span>
                            <span>${timeStr}</span>
                            <span class="meta-dot"></span>
                            <span>${views} 次浏览</span>
                            <span class="meta-dot"></span>
                            <span>${likes} 赞</span>
                        </div>
                    </article>
                `;
            }

            // 帖子详情（无作者用户名，使用UUID）
            function renderPostDetail(post) {
                const coverHtml = (post.posts_hascover && post.posts_cover_url && post.posts_cover_url !== 'N/A')
                    ? `<img class="post-detail-cover" src="${post.posts_cover_url}?width=800" alt="封面">`
                    : '';
                const tags = post.tags || [];
                const images = post.images || [];
                let extraImagesHtml = '';
                if (images.length > 0) {
                    extraImagesHtml = '<div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:16px;">' +
                        images.map(img => `<img src="${img.postimg_w400}" style="max-width:200px; border-radius:12px;" alt="配图">`).join('') +
                        '</div>';
                }
                const contentHtml = renderMarkdown(post.posts_content);

                return `
                    <div class="post-detail-card">
                        ${coverHtml}
                        <h2 style="font-size:1.6rem; font-weight:700; margin-bottom:4px;">${escapeHtml(post.posts_title)}</h2>
                        <div class="post-detail-meta">
                            <span>作者：${escapeHtml(post.posts_author_id)}</span>
                            <span class="meta-dot"></span>
                            <span>${formatRelativeTime(post.posts_created_at)}</span>
                            <span class="meta-dot"></span>
                            <span>${post.posts_views} 次浏览</span>
                        </div>
                        <div class="post-detail-tags">
                            ${tags.map(t => `<span class="post-detail-tag">#${escapeHtml(t.tag_name)}</span>`).join('')}
                        </div>
                        <div class="post-detail-content">${contentHtml}</div>
                        ${extraImagesHtml}
                    </div>
                `;
            }

            // 评论树构建
            function buildCommentTree(comments) {
                const map = new Map();
                const roots = [];
                comments.forEach(c => {
                    c.children = [];
                    map.set(c.comment_id, c);
                });
                comments.forEach(c => {
                    if (c.comment_parent_id && map.has(c.comment_parent_id)) {
                        map.get(c.comment_parent_id).children.push(c);
                    } else {
                        roots.push(c);
                    }
                });
                return roots;
            }

            function renderComments(comments) {
                if (!comments || comments.length === 0) {
                    return '<div class="no-comments">没有评论，快来抢沙发</div>';
                }
                const tree = buildCommentTree(comments);
                let html = '<div class="comment-list">';
                function renderNode(comment, isChild = false) {
                    const authorName = comment.comment_author_id; // 暂无用户名，使用ID
                    html += `
                        <div class="comment-item">
                            <div class="comment-avatar">${authorName.charAt(0).toUpperCase()}</div>
                            <div class="comment-body">
                                <div class="comment-author">${escapeHtml(authorName)}</div>
                                <div class="comment-content">${escapeHtml(comment.comment_content)}</div>
                                <div class="comment-time">${formatRelativeTime(comment.comment_created_at)}</div>
                                ${!comment.comment_parent_id ? `<button class="comment-reply-btn" data-reply-to="${comment.comment_id}">回复</button>` : ''}
                            </div>
                        </div>
                    `;
                    if (comment.children && comment.children.length > 0) {
                        html += '<div class="comment-children">';
                        comment.children.forEach(child => renderNode(child, true));
                        html += '</div>';
                    }
                }
                tree.forEach(root => renderNode(root));
                html += '</div>';
                return html;
            }

            // 加载评论
            async function loadComments(postId) {
                const commentsSection = document.getElementById('commentsSection');
                if (!commentsSection) return;
                try {
                    const comments = await LumiNyaAPI.get('/comments/' + postId);
                    commentsSection.innerHTML = `
                        <h3 style="margin-bottom:16px;">评论</h3>
                        ${currentUser ? `
                            <div class="comment-form" id="commentForm">
                                <textarea id="commentInput" placeholder="写下你的评论..." rows="2"></textarea>
                                <button class="btn" id="submitCommentBtn">发送</button>
                            </div>
                        ` : `
                            <div style="text-align:center; padding:10px; color:var(--text-muted);">
                                请<a href="/login.html?redirect=${encodeURIComponent(window.location.href)}" style="color:#b88a5e;">登录</a>后发表评论
                            </div>
                        `}
                        <div id="commentListContainer">${renderComments(comments)}</div>
                    `;
                    // 绑定回复按钮事件
                    document.querySelectorAll('.comment-reply-btn').forEach(btn => {
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const parentId = this.dataset.replyTo;
                            if (!currentUser) {
                                showModal('🔒', '请先登录', '登录后才能回复评论', '登录', () => {
                                    window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
                                }, true);
                                return;
                            }
                            // 简单实现：在输入框附近添加提示（可优化）
                            const textarea = document.getElementById('commentInput');
                            if (textarea) {
                                textarea.placeholder = '回复该评论...';
                                textarea.dataset.parentId = parentId;
                                textarea.focus();
                            }
                        });
                    });
                    // 绑定提交评论
                    const submitBtn = document.getElementById('submitCommentBtn');
                    const commentInput = document.getElementById('commentInput');
                    if (submitBtn && commentInput) {
                        submitBtn.addEventListener('click', async () => {
                            const content = commentInput.value.trim();
                            if (!content) return;
                            const parentId = commentInput.dataset.parentId || undefined;
                            try {
                                await LumiNyaAPI.post('/comments', {
                                    postId: postId,
                                    content: content,
                                    parentId: parentId
                                });
                                // 重新加载评论
                                loadComments(postId);
                            } catch (err) {
                                alert('评论失败：' + err.message);
                            }
                        });
                    }
                } catch (err) {
                    console.error('加载评论失败', err);
                }
            }

            // Feed流加载
            async function loadFeed(initial = false) {
                if (feedLoading || !feedHasMore) return;
                feedLoading = true;
                const loadMoreEl = document.querySelector('.load-more');
                if (loadMoreEl) loadMoreEl.textContent = '加载中...';

                try {
                    const params = new URLSearchParams({ limit: '20' });
                    if (!initial && feedCursor) params.set('cursor', feedCursor);
                    const data = await LumiNyaAPI.get('/feed?' + params.toString());
                    const posts = data.posts || [];
                    feedHasMore = data.has_more;
                    feedCursor = data.next_cursor;

                    if (initial) {
                        contentFeed.querySelectorAll('.post-card, .load-more, .end-of-feed, .loading-indicator').forEach(el => el.remove());
                    }
                    const oldSentinel = document.getElementById('feedSentinel');
                    if (oldSentinel) oldSentinel.remove();

                    posts.forEach(post => {
                        const cardHtml = renderPostCard(post);
                        contentFeed.insertAdjacentHTML('beforeend', cardHtml);
                    });

                    document.querySelectorAll('.post-card').forEach(card => {
                        if (card._clickBound) return;
                        card._clickBound = true;
                        card.addEventListener('click', function(e) {
                            const postId = this.dataset.postId;
                            if (postId) {
                                window.location.href = '/home.html?post=' + postId;
                            }
                        });
                    });

                    if (feedHasMore) {
                        const loadMoreHtml = '<div class="load-more" id="loadMoreBtn">加载更多帖子</div>';
                        contentFeed.insertAdjacentHTML('beforeend', loadMoreHtml);
                        document.getElementById('loadMoreBtn').addEventListener('click', () => loadFeed(false));
                        if (feedObserver) feedObserver.disconnect();
                        const sentinel = document.getElementById('loadMoreBtn');
                        if (sentinel) {
                            feedObserver = new IntersectionObserver((entries) => {
                                if (entries[0].isIntersecting && !feedLoading) loadFeed(false);
                            }, { threshold: 0.1 });
                            feedObserver.observe(sentinel);
                        }
                    } else {
                        contentFeed.insertAdjacentHTML('beforeend', '<div class="end-of-feed">已经到底啦</div>');
                    }
                } catch (err) {
                    console.error('加载Feed失败', err);
                    contentFeed.insertAdjacentHTML('beforeend', '<div class="end-of-feed">加载失败，请稍后重试</div>');
                } finally {
                    feedLoading = false;
                    const loadMoreEl = document.querySelector('.load-more');
                    if (loadMoreEl) loadMoreEl.textContent = '加载更多帖子';
                }
            }

            // 加载帖子详情（需要鉴权，若无token弹窗）
            async function loadPostDetail(postId) {
                contentFeed.innerHTML = '<div class="loading-indicator">加载中...</div>';
                try {
                    const post = await LumiNyaAPI.get('/posts/' + postId);
                    const detailHtml = renderPostDetail(post);
                    contentFeed.innerHTML = detailHtml;
                    // 添加评论区容器
                    contentFeed.insertAdjacentHTML('beforeend', '<div class="comments-section" id="commentsSection">加载评论中...</div>');
                    loadComments(postId);
                } catch (err) {
                    if (err.message.includes('未登录') || err.message.includes('401')) {
                        showModal('🔒', '你还未登录', '登录后查看完整帖子内容', '登录', () => {
                            window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
                        }, true);
                        contentFeed.innerHTML = '<div class="end-of-feed">请登录后查看帖子</div>';
                    } else {
                        contentFeed.innerHTML = '<div class="end-of-feed">帖子加载失败</div>';
                    }
                }
            }

            // 初始化
            async function init() {
                // 用户信息
                if (hasToken()) {
                    try {
                        currentUser = await LumiNyaAPI.get('/users/me');
                    } catch (e) {
                        currentUser = null;
                    }
                }
                renderHeader();
                renderLeftSidebar();
                renderRightSidebar();

                const urlParams = new URLSearchParams(window.location.search);
                postDetailId = urlParams.get('post');

                if (postDetailId) {
                    if (!hasToken()) {
                        showModal('🔒', '你还未登录', '登录后查看完整帖子内容', '登录', () => {
                            window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
                        }, true);
                        contentFeed.innerHTML = '<div class="end-of-feed">请登录后查看帖子</div>';
                    } else {
                        await loadPostDetail(postDetailId);
                    }
                } else {
                    await loadFeed(true);
                }

                // 未登录且非详情，3秒后弹窗
                if (!currentUser && !postDetailId) {
                    setTimeout(() => {
                        if (!currentUser && !hasToken()) {
                            showModal('✨', '登录后获得更精彩体验', '解锁年轮成长、AI 陪伴与专属创作空间', '登录', () => {
                                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
                            }, true);
                        }
                    }, 3000);
                }

                // 浮动按钮
                createBtn.addEventListener('click', () => {
                    if (!hasToken()) {
                        window.location.href = '/login.html?redirect=' + encodeURIComponent('/contentcenter.html');
                    } else {
                        window.location.href = '/contentcenter.html';
                    }
                });

                modalClose.addEventListener('click', hideModal);
                modalOverlay.addEventListener('click', function(e) {
                    if (e.target === modalOverlay) hideModal();
                });
            }

            init().catch(err => console.error('初始化失败', err));
        })();
    </script>
</body>
</html>
